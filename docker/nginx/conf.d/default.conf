upstream web {
    server web:3000;
}

upstream rest_api {
    server rest-api:3001;
}

upstream graphql_api {
    server graphql-api:3002;
}

server {
    listen 80;
    server_name _;

    # Real client IP comes from Cloudflare Tunnel via CF-Connecting-IP.
    # $remote_addr here is the cloudflared container — not the browser.
    proxy_set_header X-Real-IP        $http_cf_connecting_ip;
    proxy_set_header X-Forwarded-For  $http_cf_connecting_ip;
    # Tell upstream apps the connection arrived over HTTPS (Cloudflare terminates TLS)
    proxy_set_header X-Forwarded-Proto https;

    # Security headers — HSTS is handled by Cloudflare; omit it here
    add_header X-Frame-Options         "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options  "nosniff"                      always;
    add_header X-XSS-Protection        "1; mode=block"                always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    client_max_body_size 2m;

    # Nginx health check (returns 200 directly, no proxy needed)
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # GraphQL API
    location /graphql {
        proxy_pass http://graphql_api;
        proxy_set_header Host $host;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # Auth and REST API
    location ~ ^/(auth|api)/ {
        proxy_pass http://rest_api;
        proxy_set_header Host        $host;
        proxy_set_header Cookie      $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # Everything else -> web SSR
    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }
}
