[meta]
archetype = "mega-sharpedo-ex"
version = "1.0"
total_cards = "58"
notes = """
⚠️  DECK IS 58/60 — 2 cards missing. Add before finalizing.

Mega Gengar ex bypass (no Haunter line needed):
  Secret Box (discard 3) → get Ultra Ball + Binding Mochi + Grimsley's Move + Academy at Night
  → Play Academy at Night (Stadium)
  → Ultra Ball → search Mega Gengar ex into hand
  → Academy at Night effect: put Mega Gengar ex on top of deck
  → Grimsley's Move: look at top 7, bench any Darkness Pokémon found → Mega Gengar ex lands on bench!

Core damage loop:
  - Salvatore: evolves Carvanha → Sharpedo same turn played (even T1)
  - Toxtricity (Sinister Surge): attaches Dark Energy to Sharpedo + places 2 damage counters
    → immediately activates Hungry Jaws for 270 (120 + 150 bonus)
  - Carvanha (Reckless Charge): 10 self-damage also activates Hungry Jaws
  - Janine's Secret Art: attaches Dark Energy to 2 Dark Pokémon + Poisons Active
    → Binding Mochi on Active Sharpedo = +40 damage on top

Prize math:
  - Mega Sharpedo ex: 3-prize target (Mega Evolution ex Rule)
  - Mega Gengar ex (Shadowy Concealment): opponent takes 1 fewer prize if
    a Dark Pokémon is KO'd by Pokémon ex → Sharpedo worth only 2 prizes
  - Wally's Compassion: full heal + energy retrieval on any Mega ex (reset escape hatch)

Legality flags:
  - me3-62   (Meowth ex): Perfect Order shows Not Legal in API — verify before tournament play.
  - me2pt5-39 (Psyduck): J-mark in me2pt5 shows Not Legal in API — verify before tournament play.
  - me2pt5-198 (Poké Pad): same set — verify before tournament play.
"""
