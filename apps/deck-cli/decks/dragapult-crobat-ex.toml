# ─── Meta ──────────────────────────────────────────────────────────────────────

[meta]
archetype = "dragapult-crobat-ex"
version = "1.0"
total_cards = "60"
notes = """
Spread/snipe combo deck. Counter stacking loop:
  - Risky Ruins:           +2 counters on any Basic non-Darkness Pokémon either player benches
                           (Darkness Zubat is immune; use Munkidori to redirect counters from your own bench)
  - Golbat (Sneaky Bite):  +2 counters on any Pokémon on evolve
  - Crobat ex (Biting Spree): +4 counters spread across 2 Pokémon on evolve
  - Dragapult ex (Phantom Dive): 200 + spread 6 counters across bench
  - Munkidori (Adrena-Brain): redirect 3 counters from your Pokémon to opponent's
    (requires Darkness Energy — covered by 2x Dark)

  Crobat ex bounces to hand via Assassin's Return (120 dmg, 2 Dark), retriggering
  Biting Spree on replay. Dawn tutors the full Dreepy→Drakloak→Dragapult ex line
  in a single search. Petrel fetches any Trainer on demand. Tera Orb tutors
  Dragapult ex directly. Neo Upper Energy provides Fire+Psychic on any Stage 2.

Legality flags:
  - me2pt5-198 (Poké Pad): Ascended Heroes shows Not Legal in API — verify before tournament play.
  - me2pt5-39  (Psyduck): same set — verify before tournament play.
  - me3-84     (Rosa's Encouragement): Perfect Order shows Not Legal in API — verify before tournament play.
"""
