[meta]
archetype = "ns-zoroark-ex"
version = "1.0"
total_cards = "60"
notes = """
N's Zoroark ex (Night Joker) copies any benched N's Pokémon's attack for 2 Dark Energy:
  - N's Zekrom (Rampaging Thunder): 250 damage — primary KO attack
  - N's Sigilyph (Victory Symbol): instant win at exactly 1 Prize remaining
  - N's Reshiram (Powerful Rage): 20× damage counters — scales off Toxtricity counter placement

Key combos:
  - Binding Mochi + Pecharunt ex pivot = Zoroark ex Poisoned on entry → Night Joker copies
    Rampaging Thunder for 290 instead of 250
  - Toxtricity (Sinister Surge): attaches Dark Energy from deck to benched Dark Pokémon;
    2 damage counters placed feed Reshiram's Powerful Rage scaling
  - N's PP Up: recovers Dark Energy from discard back to benched N's Pokémon
  - N's Plan: shifts up to 2 Bench Energy → Active (loads Zoroark ex in one turn)
  - Unfair Stamp (ACE SPEC): fires after a KO — both players reset hands, you draw 5 / opponent 2
  - N's Castle: free retreat for all N's Pokémon — full board mobility
  - Meowth ex (Last-Ditch Catch): on bench entry, tutors any Supporter immediately
  - Budew (Itchy Pollen): one-turn Item lock on opponent — disrupts Item-heavy setups
  - Cyrano: grabs up to 3 Pokémon ex in one search

Legality flags:
  - me3-62  (Meowth ex): Perfect Order shows Not Legal in API — verify before tournament play.
  - me2pt5-198 (Poké Pad): Ascended Heroes shows Not Legal in API — verify before tournament play.
"""
