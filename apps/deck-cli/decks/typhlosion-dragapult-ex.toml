[meta]
archetype = "typhlosion-dragapult-ex"
version = "1.0"
total_cards = "60"
notes = """
Win conditions:
  - Ethan's Typhlosion (Buddy Blast): 40 + 60 per Adventure in discard.
    With 4 Adventures burned = 280 for 1 Fire Energy.
  - Dragapult ex (Phantom Dive): 200 + 6 bench damage counters for Fire+Psychic.
    Tera typing = safe bench setup.

Engine loop: Ethan's Quilava tutors 1 Adventure per turn →
  Adventures pile in discard → Typhlosion Buddy Blast scales up.
  Ethan's Adventure also fetches Ethan's Pokémon + Fire Energy.

Support roles:
  - Psyduck: utility bench Pokémon (Ascended Heroes / me2pt5)
  - Shaymin: reroutes Energy after attacking (ideal for cycling off a spent attacker)
  - Fezandipiti ex: reactive draw engine when opponent takes a KO

Legality flags:
  - me3-84  (Rosa's Encouragement): Perfect Order set shows Not Legal in API — verify before tournament play.
  - me2pt5-198 (Poké Pad): Ascended Heroes shows Not Legal in API — verify before tournament play.
  - me2pt5-39 (Psyduck): same set as above — verify before tournament play.
"""
