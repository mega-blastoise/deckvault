services:
  nginx:
    image: nginx:1.27-alpine
    container_name: pokemon-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_started
      rest-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pika

  web:
    image: pokemon-web:latest
    container_name: pokemon-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      - PORT=3000
      - API_URL=http://rest-api:3001/api/v1
      - REST_API_URL=http://rest-api:3001
    expose:
      - "3000"
    depends_on:
      rest-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pika

  rest-api:
    image: pokemon-rest-api:latest
    container_name: pokemon-rest-api
    build:
      context: .
      dockerfile: apps/rest-api/Dockerfile
    env_file:
      - .env.prod
    environment:
      - REST_API_PORT=3001
      - REST_API_HOST=0.0.0.0
      - DATABASE_PATH=/data/pokemon-data.sqlite3.db
      - DATABASE_READONLY=true
      - LOG_LEVEL=info
    volumes:
      - ./database:/data:ro
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - pika

networks:
  pika:
