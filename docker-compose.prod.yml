services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pokemon-cloudflared
    command: tunnel --no-autoupdate run
    env_file:
      - .env.prod
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - pika

  nginx:
    image: nginx:1.27-alpine
    container_name: pokemon-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      web:
        condition: service_started
      rest-api:
        condition: service_healthy
      graphql-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pika

  web:
    image: ghcr.io/mega-blastoise/deckvault-web:${IMAGE_TAG:-latest}
    container_name: pokemon-web
    environment:
      - PORT=3000
      - API_URL=http://rest-api:3001/api/v1
      - REST_API_URL=http://rest-api:3001
      - GRAPHQL_API_URL=http://graphql-api:3002
    expose:
      - "3000"
    depends_on:
      rest-api:
        condition: service_healthy
      graphql-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pika

  rest-api:
    image: ghcr.io/mega-blastoise/deckvault-rest-api:${IMAGE_TAG:-latest}
    container_name: pokemon-rest-api
    env_file:
      - .env.prod
    environment:
      - REST_API_PORT=3001
      - REST_API_HOST=0.0.0.0
      - DATABASE_PATH=/data/pokemon-data.sqlite3.db
      - DATABASE_READONLY=true
      - DECK_DATABASE_PATH=/tmp/decks.sqlite3.db
      - LOG_LEVEL=info
    volumes:
      - ./database:/data
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - pika

  graphql-api:
    image: ghcr.io/mega-blastoise/deckvault-graphql-api:${IMAGE_TAG:-latest}
    container_name: pokemon-graphql-api
    env_file:
      - .env.prod
    environment:
      - GRAPHQL_API_PORT=3002
      - GRAPHQL_API_HOST=0.0.0.0
      - DATABASE_PATH=/data/pokemon-data.sqlite3.db
      - DATABASE_READONLY=true
      - LOG_LEVEL=info
    volumes:
      - ./database:/data
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - pika

  postgres:
    image: postgres:17-alpine
    container_name: pokemon-postgres
    env_file:
      - .env.prod
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pokemon}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - pika

volumes:
  postgres_data:

networks:
  pika:
