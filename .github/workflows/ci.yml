name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install
      - run: bun run lint

  check-types:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install
      - run: bun run check-types

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install
      # Build the deck-cli bundle so phase3 CLI-guard smoke tests can exercise
      # the binary. Phases 2/4/5/7 skip gracefully without MCP/DB. Phase 1
      # always runs (pure TOML schema validation, no process spawning).
      - run: bun run --filter=@pokemon/deck-cli build
      - run: bun run test

  smoke-build:
    name: Smoke build (linux-x64 binary + Docker image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - uses: docker/setup-buildx-action@v3
      - run: bun install
      # Validate the per-platform Bun compile driver works end-to-end for the
      # default CI architecture. Catches issues like the text-loader / asset
      # bundling break before they land in a tagged release.
      - name: Compile deck-cli for linux-x64
        run: bun apps/deck-cli/build/compile.ts linux-x64
      - name: Smoke run compiled binary
        run: |
          ./dist-packages/cli-platforms/linux-x64/bin/johto --help
      # Build the Docker image without pushing — a "Dockerfile still works"
      # check on every PR, not just on tag push.
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.johto
          platforms: linux/amd64
          push: false
          load: true
          tags: johto:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke run Docker image
        run: docker run --rm johto:ci --help
