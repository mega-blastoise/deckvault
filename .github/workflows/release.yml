name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-rust:
    name: Build Rust (${{ matrix.suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux-x64
            triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - suffix: linux-arm64
            triple: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - suffix: darwin-x64
            triple: x86_64-apple-darwin
            runner: macos-13
            use_cross: false
          - suffix: darwin-arm64
            triple: aarch64-apple-darwin
            runner: macos-14
            use_cross: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}
      - if: matrix.use_cross
        run: cargo install cross
      - run: bash apps/mcp-server/build/pack-platform.sh ${{ matrix.triple }} ${{ matrix.suffix }}
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-server-${{ matrix.suffix }}
          path: dist-packages/mcp-server-platforms/${{ matrix.suffix }}/

  build-bun:
    name: Build Bun (${{ matrix.suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux-x64
          - suffix: linux-arm64
          - suffix: darwin-x64
          - suffix: darwin-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun apps/deck-cli/build/compile.ts ${{ matrix.suffix }}
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.suffix }}
          path: dist-packages/cli-platforms/${{ matrix.suffix }}/

  publish:
    name: Publish npm + GHCR + Release
    needs: [build-rust, build-bun]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          path: dist-packages-artifacts

      - name: Assemble dist-packages from artifacts
        run: |
          for suffix in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            cp -r dist-packages-artifacts/cli-${suffix} dist-packages/cli-platforms/${suffix}
            cp -r dist-packages-artifacts/mcp-server-${suffix} dist-packages/mcp-server-platforms/${suffix}
          done

      - name: Stamp versions
        run: bun scripts/stamp-release-versions.ts ${{ github.ref_name }}

      - name: Smoke test (assemble linux-x64 install, run --dry-run)
        run: |
          SMOKE=$(mktemp -d)
          mkdir -p "$SMOKE/node_modules/@johto-ai"
          cp -r dist-packages/cli                            "$SMOKE/cli"
          cp -r dist-packages/cli-platforms/linux-x64        "$SMOKE/node_modules/@johto-ai/cli-linux-x64"
          cp -r dist-packages/mcp-server-platforms/linux-x64 "$SMOKE/node_modules/@johto-ai/mcp-server-linux-x64"
          ln -sf "../cli" "$SMOKE/node_modules/@johto-ai/cli"

          # Pull card-data from npm (published independently via release-card-data.yml).
          # Must have a card-data-vX.Y.Z release on npm BEFORE this workflow runs.
          (cd "$SMOKE" && npm install --no-save --prefix . @johto-ai/card-data@latest)

          chmod +x "$SMOKE/node_modules/@johto-ai/cli-linux-x64/bin/johto"
          chmod +x "$SMOKE/node_modules/@johto-ai/mcp-server-linux-x64/bin/pokemon-mcp-server"

          node "$SMOKE/cli/bin/johto.js" \
            --deck "$(pwd)/apps/deck-cli/decks/example.toml" \
            --dry-run 2>&1 | tee /tmp/smoke.log

          grep -q "SYSTEM PROMPT" /tmp/smoke.log || { echo "::error::Smoke test failed — --dry-run did not produce SYSTEM PROMPT"; exit 1; }
          echo "::notice::Smoke test passed"

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for suffix in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            npm publish --access public --provenance "dist-packages/cli-platforms/${suffix}"
            npm publish --access public --provenance "dist-packages/mcp-server-platforms/${suffix}"
          done
          npm publish --access public --provenance dist-packages/cli

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.johto
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/johto:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/johto:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release with binary tarballs
        run: |
          for suffix in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            tar -czf "johto-${{ github.ref_name }}-${suffix}.tar.gz" \
                -C dist-packages-artifacts/cli-${suffix} bin \
                -C dist-packages-artifacts/mcp-server-${suffix} bin
          done
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            johto-${{ github.ref_name }}-*.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
