name: Release

on:
  push:
    tags:
      - 'johto/v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-rust:
    name: Build Rust (${{ matrix.suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux-x64
            triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - suffix: linux-arm64
            triple: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - suffix: darwin-x64
            triple: x86_64-apple-darwin
            runner: macos-14
            use_cross: false
          - suffix: darwin-arm64
            triple: aarch64-apple-darwin
            runner: macos-14
            use_cross: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}
      - if: matrix.use_cross
        run: cargo install cross
      - run: bash apps/mcp-server/build/pack-platform.sh ${{ matrix.triple }} ${{ matrix.suffix }}
      - uses: actions/upload-artifact@v5
        with:
          name: mcp-server-${{ matrix.suffix }}
          path: dist-packages/mcp-server-platforms/${{ matrix.suffix }}/

  build-bun:
    name: Build Bun (${{ matrix.suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux-x64
          - suffix: linux-arm64
          - suffix: darwin-x64
          - suffix: darwin-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun apps/deck-cli/build/compile.ts ${{ matrix.suffix }}
      - uses: actions/upload-artifact@v5
        with:
          name: cli-${{ matrix.suffix }}
          path: dist-packages/cli-platforms/${{ matrix.suffix }}/

  publish:
    name: Publish npm + GHCR + Release
    needs: [build-rust, build-bun]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DECKVAULT_GHCR_GITHUB_TOKEN }}
      - uses: actions/download-artifact@v5
        with:
          path: dist-packages-artifacts

      - name: Extract version
        id: version
        run: |
          RAW="${{ github.ref_name }}"
          VERSION="${RAW#johto/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Assemble dist-packages from artifacts
        run: |
          for suffix in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            cp -r dist-packages-artifacts/cli-${suffix} dist-packages/cli-platforms/${suffix}
            cp -r dist-packages-artifacts/mcp-server-${suffix} dist-packages/mcp-server-platforms/${suffix}
          done

      - name: Stamp versions
        run: bun scripts/stamp-release-versions.ts ${{ github.ref_name }}

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for suffix in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            (cd "dist-packages/cli-platforms/${suffix}" && npm publish --access public --provenance)
            (cd "dist-packages/mcp-server-platforms/${suffix}" && npm publish --access public --provenance)
          done
          (cd dist-packages/cli && npm publish --access public --provenance)

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.johto
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/johto:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/johto:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release with binary tarballs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for suffix in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            tar -czf "johto-${VERSION}-${suffix}.tar.gz" \
                -C dist-packages-artifacts/cli-${suffix} bin \
                -C dist-packages-artifacts/mcp-server-${suffix} bin
          done
          gh release create ${{ github.ref_name }} \
            --title "johto v${VERSION}" \
            --generate-notes \
            johto-${VERSION}-*.tar.gz
        env:
          GH_TOKEN: ${{ secrets.DECKVAULT_GHCR_GITHUB_TOKEN }}
