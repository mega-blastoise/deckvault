name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.detect.outputs.web }}
      rest_api: ${{ steps.detect.outputs.rest_api }}
      graphql_api: ${{ steps.detect.outputs.graphql_api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — first release, deploying all services"
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "rest_api=true" >> "$GITHUB_OUTPUT"
            echo "graphql_api=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing $PREV_TAG..HEAD"
          CHANGED=$(git diff --name-only "$PREV_TAG..HEAD")
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^(apps/web/|packages/@clients/|packages/@configs/|packages/@database/|packages/@logger/|packages/@utils/)'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -qE '^(apps/rest-api/|packages/@clients/|packages/@database/|packages/@framework/|packages/@configs/|packages/@build/)'; then
            echo "rest_api=true" >> "$GITHUB_OUTPUT"
          else
            echo "rest_api=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -qE '^(apps/graphql-api/|packages/@database/|packages/@framework/|packages/@configs/|packages/@build/)'; then
            echo "graphql_api=true" >> "$GITHUB_OUTPUT"
          else
            echo "graphql_api=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-web:
    name: Deploy Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/mega-blastoise/deckvault-web:latest
            ghcr.io/mega-blastoise/deckvault-web:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-rest-api:
    name: Deploy REST API
    needs: changes
    if: needs.changes.outputs.rest_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/rest-api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/mega-blastoise/deckvault-rest-api:latest
            ghcr.io/mega-blastoise/deckvault-rest-api:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-graphql-api:
    name: Deploy GraphQL API
    needs: changes
    if: needs.changes.outputs.graphql_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/graphql-api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/mega-blastoise/deckvault-graphql-api:latest
            ghcr.io/mega-blastoise/deckvault-graphql-api:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
