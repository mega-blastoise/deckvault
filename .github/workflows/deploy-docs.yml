name: Deploy Docs

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - run: bun install

      - name: Build docsites
        run: |
          cd docsites/deployment && bun run docs:build
          cd ../../docsites/architecture && bun run docs:build
          cd ../../docsites/database && bun run docs:build
          cd ../../docsites/api && bun run docs:build
          cd ../../docsites/development && bun run docs:build
          cd ../..

      - name: Assemble pages output
        run: |
          mkdir -p _site
          cp -r docsites/deployment/site _site/deployment
          cp -r docsites/architecture/site _site/architecture
          cp -r docsites/database/site _site/database
          cp -r docsites/api/site _site/api
          cp -r docsites/development/site _site/development

      - name: Create root index
        run: |
          cat > _site/index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>DeckVault Documentation</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
              .container { max-width: 640px; width: 100%; padding: 2rem; }
              h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #f0f6fc; }
              p { margin-bottom: 2rem; color: #8b949e; }
              .links { display: flex; flex-direction: column; gap: 0.75rem; }
              a { display: block; padding: 1rem 1.25rem; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #58a6ff; text-decoration: none; font-size: 1.1rem; transition: border-color 0.15s; }
              a:hover { border-color: #58a6ff; }
              a span { display: block; font-size: 0.85rem; color: #8b949e; margin-top: 0.25rem; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>DeckVault Docs</h1>
              <p>Project Johto documentation hub</p>
              <div class="links">
                <a href="./deployment/">Deployment<span>Infrastructure, Docker, CI/CD</span></a>
                <a href="./architecture/">Architecture<span>System design, data flow, decisions</span></a>
                <a href="./database/">Database<span>Schema, migrations, queries</span></a>
                <a href="./api/">API<span>GraphQL and REST API reference</span></a>
                <a href="./development/">Development<span>Setup, conventions, workflows</span></a>
              </div>
            </div>
          </body>
          </html>
          INDEXEOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
